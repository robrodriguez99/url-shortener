services:
  frontend:
    build:
      context: .
      target: development
    command: npm run frontend:dev -- --host 0.0.0.0
    environment:
      VITE_API_ORIGIN: http://localhost:${PORT:-3000}
      VITE_API_PROXY_TARGET: http://api:${PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      target: development
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      MONGODB_URI: mongodb://mongo:27017/url_shortener
      REDIS_URL: redis://redis:6379
      REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECONDS:-86400}
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:?RABBITMQ_USER is required}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}@rabbitmq:5672"
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-tinyurl.events}
      RABBITMQ_ACCESS_QUEUE: ${RABBITMQ_ACCESS_QUEUE:-tinyurl.accessed.persist}
      RABBITMQ_PUBLISH_TIMEOUT_MS: ${RABBITMQ_PUBLISH_TIMEOUT_MS:-1000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:${PORT:-3000}/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      target: development
    command: npm run worker:dev
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/url_shortener
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:?RABBITMQ_USER is required}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}@rabbitmq:5672"
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-tinyurl.events}
      RABBITMQ_ACCESS_QUEUE: ${RABBITMQ_ACCESS_QUEUE:-tinyurl.accessed.persist}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mongo:
    image: mongo:8
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:?RABBITMQ_USER is required}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  frontend_node_modules:
  api_node_modules:
  worker_node_modules:
  mongo_data:
  redis_data:
  rabbitmq_data:
